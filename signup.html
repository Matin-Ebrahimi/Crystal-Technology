<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign up — Crystal Tech Services</title>
<meta name="description" content="Create your Crystal Tech Services account.">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="assets/favicon-192.png">
<link rel="apple-touch-icon" href="assets/favicon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600;700&family=Chivo+Mono:wght@400;500&family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/pages.css">
</head>
<body>
<a href="#main" class="skip-link">Skip to content</a>
<div class="ambient"></div>

<header id="site-header" class="site-header"></header>

<main id="main">
  <div class="auth-wrap">
    <div class="auth-card" data-reveal>
      <a href="index.html" class="brand-mark"><img src="assets/horizontal-dark.png" alt="Crystal Tech Services" style="height:26px;"></a>
      <h1 data-i18n="auth.signupHeading">Create your account</h1>
      <p class="sub" data-i18n="auth.signupSub">Join the Crystal Tech community</p>

      <form id="signup-form" novalidate>
        <div class="field">
          <label data-i18n="auth.nameLabel">Full name</label>
          <input type="text" name="name" required data-i18n-placeholder="auth.namePh" placeholder="Jane Doe">
        </div>
        <div class="field">
          <label data-i18n="auth.emailLabel">Email</label>
          <input type="email" name="email" required data-i18n-placeholder="auth.emailPh" placeholder="name@company.com">
        </div>
        <div class="field-row">
          <div class="field">
            <label data-i18n="auth.passLabel">Password</label>
            <input type="password" name="password" required data-i18n-placeholder="auth.passPh" placeholder="••••••••">
          </div>
          <div class="field">
            <label data-i18n="auth.confirmLabel">Confirm password</label>
            <input type="password" name="confirm" required data-i18n-placeholder="auth.passPh" placeholder="••••••••">
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-lg btn-block" style="margin-top:6px;" data-i18n="auth.signupBtn">Create account</button>
      </form>

      <p class="auth-foot"><span data-i18n="auth.hasAccount">Already have an account?</span> <a href="signin.html" data-i18n="nav.signin">Sign in</a></p>
    </div>
  </div>
</main>

<footer id="site-footer" class="site-footer"></footer>

<script src="js/strings.js"></script>
<script src="js/data.js"></script>
<script src="js/icons.js"></script>
<script src="js/i18n.js"></script>
<script src="js/components.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
