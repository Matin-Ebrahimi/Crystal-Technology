<!DOCTYPE html>

<meta name="description" content="Read the latest from the Crystal Tech Services blog.">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="assets/favicon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600;700&family=Chivo+Mono:wght@400;500&family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet">

<body>
<a href="#main" class="skip-link">Skip to content</a>
<div class="ambient"></div>

<header id="site-header" class="site-header"></header>

<main id="main">
  <article>
    <div class="wrap">
      <a href="blog.html" class="mono" style="font-size:12.5px; color:var(--muted-2); display:inline-flex; align-items:center; gap:6px; margin-top:32px;" data-i18n="common.backToBlog">← Back to blog</a>
    </div>

    <header class="article-header">
      <span class="cat" id="art-cat"></span>
      <h1 id="art-title"></h1>
      <div class="article-meta">
        <span class="avatar" id="art-avatar"></span>
        <span id="art-author"></span><span>·</span>
        <span id="art-date"></span><span>·</span>
        <span id="art-readtime"></span>
      </div>
    </header>

    <div class="article-cover"><span id="art-cover-ico"></span></div>

    <div class="article-body" id="art-body"></div>

    <div class="wrap-narrow">
      <div class="article-share">
        <a href="#" id="share-twitter" aria-label="Share on X" target="_blank" rel="noopener"></a>
        <a href="#" id="share-linkedin" aria-label="Share on LinkedIn" target="_blank" rel="noopener"></a>
        <a href="#" id="share-copy" aria-label="Copy link"></a>
      </div>
    </div>
  </article>

  <section class="related-posts">
    <span class="eyebrow wrap" style="display:inline-flex; margin-bottom:20px;" data-i18n="common.relatedPosts">Related posts</span>
    <div class="wrap">
      <div class="blog-grid" id="related-grid"></div>
    </div>
  </section>
</main>

<footer id="site-footer" class="site-footer"></footer>
