<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Write an article — Crystal Tech Services</title>
<meta name="description" content="Submit an article to the Crystal Tech Services blog for editorial review.">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="assets/favicon-192.png">
<link rel="apple-touch-icon" href="assets/favicon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600;700&family=Chivo+Mono:wght@400;500&family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/pages.css">
</head>
<body>
<a href="#main" class="skip-link">Skip to content</a>
<div class="ambient"></div>

<header id="site-header" class="site-header"></header>

<main id="main">
  <section class="section-tight">
    <div class="wrap-narrow">

      <div id="submit-form-wrap">
        <span class="eyebrow" data-i18n="contribute.dashHeading" style="margin-bottom:14px; display:inline-flex;">Author dashboard</span>
        <h1 style="margin-bottom:28px;" data-i18n="contribute.formTitle">Write / submit article</h1>

        <form id="article-form" novalidate>
          <div class="field">
            <label data-i18n="contribute.fieldTitle">Title</label>
            <input type="text" name="title" required data-i18n-placeholder="contribute.fieldTitlePh" placeholder="Give your article a clear, compelling title">
          </div>
          <div class="field">
            <label data-i18n="contribute.fieldCategory">Category</label>
            <select name="category" id="category-select"></select>
          </div>
          <div class="field">
            <label data-i18n="contribute.fieldCover">Cover image</label>
            <div class="dropzone" id="dropzone">
              <span id="dropzone-ico"></span>
              <span data-i18n="contribute.fieldCoverHint">Drag &amp; drop an image, or click to browse</span>
              <input type="file" id="cover-input" accept="image/*" style="display:none;">
              <div id="cover-filename" class="mono" style="margin-top:10px; color:var(--accent-lt); font-size:12.5px;"></div>
            </div>
          </div>
          <div class="field">
            <label data-i18n="contribute.fieldBody">Article body</label>
            <textarea name="body" rows="10" required data-i18n-placeholder="contribute.fieldBodyPh" placeholder="Write your article here…"></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-lg btn-block" data-i18n="contribute.submitBtn">Submit for review</button>
        </form>
      </div>

      <div id="pending-confirm-wrap" class="pending-confirm" style="display:none;">
        <div class="ico" id="pending-ico"></div>
        <h1 data-i18n="contribute.pendingTitle">Your article is pending review.</h1>
        <p data-i18n="contribute.pendingBody">Thanks for your submission.</p>
        <a href="dashboard.html" class="btn btn-primary btn-lg" style="margin-top:24px;" data-i18n="contribute.dashboardBtn">Go to author dashboard</a>
      </div>

    </div>
  </section>
</main>

<footer id="site-footer" class="site-footer"></footer>

<script src="js/strings.js"></script>
<script src="js/data.js"></script>
<script src="js/icons.js"></script>
<script src="js/i18n.js"></script>
<script src="js/components.js"></script>
<script src="js/submit-article.js"></script>
</body>
</html>
